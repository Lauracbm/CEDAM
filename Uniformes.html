    <script>
        document.addEventListener('DOMContentLoaded', () => {

            const triggers = document.querySelectorAll('.cloud-btn');
            const modal = document.getElementById('modal-container');
            const mImg = document.getElementById('modal-img');
            const mTitle = document.getElementById('modal-title');
            const mText = document.getElementById('modal-text');
            const closeBtn = document.getElementById('modal-close');
            const mText2 = document.getElementById('modal-text-2');

            triggers.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();

                    const nombre = btn.getAttribute('data-nombre');
                    const foto = btn.getAttribute('data-foto');
                    const desc = btn.getAttribute('data-desc');
                    const desc2 = btn.getAttribute('data-desc2');
                    
                    mTitle.innerText = nombre;
                    mImg.src = foto;
                    mText.innerText = desc;
                    mText2.innerText = desc2;

                    // 2. Lógica para la segunda descripción
            if (desc2 && mText2) {
                mText2.innerText = desc2;
                mText2.classList.remove('hidden'); // La mostramos si existe
            } else if (mText2) {
                mText2.innerText = "";
                mText2.classList.add('hidden'); // La ocultamos si no hay
            }

                    modal.classList.remove('hidden');
                    document.body.style.overflow = 'hidden';
                });
            });

            const cerrarModal = () => {
                modal.classList.add('hidden');
                document.body.style.overflow = 'auto';
            };

            closeBtn.addEventListener('click', cerrarModal);

            modal.addEventListener('click', (e) => {
                if (e.target === modal) cerrarModal();
            });
        });
    </script>
