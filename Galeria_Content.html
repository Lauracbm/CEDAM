     <script>
                const urlParams = new URLSearchParams(window.location.search);
                const galleryParam = urlParams.get('gallery');
                console.log(galleryParam);
                let galleryItems = [];

                for (let i = 0; i < 24; i++) {
                    galleryItems.push({
                        href: `https://picsum.photos/1920/1080?random=${i}`,
                        hrefImg: `https://picsum.photos/1920/1080?random=${i}`,
                        type: 'image'
                    });
                }

                const galleryDiv = document.getElementById('galeria');

                function addToGallery(item) {
                    const newLink = document.createElement('a');
                    newLink.href = item.hrefImg;
                    newLink.classList.add('glightbox');
                    const newImg = document.createElement('img');
                    newImg.src = item.href;
                    newLink.appendChild(newImg);
                    galleryDiv.appendChild(newLink);
                }

                galleryItems.forEach(item => {
                    addToGallery(item);
                });



                document.addEventListener('DOMContentLoaded', function () {
                    const lightbox = GLightbox({
                        selector: '.glightbox',
                        touchNavigation: true,
                        loop: true,
                        autoplayVideos: true
                    });
                });


            </script>
