     <script>            
    const urlParams = new URLSearchParams(window.location.search);
    const folderName = urlParams.get('folder');
    
   /* if (folderName) {
        document.querySelector('h1').innerText = `Galería: ${folderName.charAt(0).toUpperCase() + folderName.slice(1)}`;
    }*/

    const galleryDiv = document.getElementById('galeria');
    
    // Configuración: Define cuántas fotos hay por carpeta o usa un array
    const totalImages = 20;

    for (let i = 1; i <= totalImages; i++) {
        // La ruta ahora es dinámica: IMG/instalaciones/1.jpg, etc.
        const imgPath = `IMG/${folderName}/${i}.jpg`; 
        
        const newLink = document.createElement('a');
        newLink.href = imgPath;
        newLink.classList.add('glightbox');
        
        const newImg = document.createElement('img');
        newImg.src = imgPath;
        newImg.alt = `Imagen ${i} de ${folderName}`;
        newImg.classList.add('w-full', 'h-64', 'object-cover', 'rounded-lg', 'hover:opacity-80', 'transition');
        
        // Manejo de error: Si la imagen no existe, no la muestra
        newImg.onerror = function() {
            newLink.remove(); 
        };

        newLink.appendChild(newImg);
        galleryDiv.appendChild(newLink);
    }

    // Inicializar GLightbox después de crear los elementos
    document.addEventListener('DOMContentLoaded', function () {
        const lightbox = GLightbox({
            selector: '.glightbox',
            touchNavigation: true,
            loop: true
        });
    });
</script>
